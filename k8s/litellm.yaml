apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-service
data:
  config.yaml: |
    model_list:
      - model_name: qwen2.5-7b
        litellm_params:
          model: openai/qwen2.5-7b
          api_base: http://vllm:8000/v1
          api_key: "not-needed-locally"
      - model_name: nomic-embed
        litellm_params:
          model: openai/nomic-embed-text-v1.5
          api_base: http://embed-server:8001/v1
          api_key: "not-needed-locally"
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai-service
spec:
  replicas: 1
  selector:
    matchLabels: {app: litellm}
  template:
    metadata:
      labels: {app: litellm}
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - {containerPort: 4000}
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secrets
                  key: litellm-master-key
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests: {memory: "256Mi", cpu: "250m"}
            limits:   {memory: "1Gi",   cpu: "1000m"}
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai-service
spec:
  selector: {app: litellm}
  ports:
    - {port: 4000, targetPort: 4000}
