apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-pvc
  namespace: ai-service
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ai-service
spec:
  replicas: 1
  selector:
    matchLabels: {app: openwebui}
  template:
    metadata:
      labels: {app: openwebui}
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - {containerPort: 8080}
          env:
            - {name: OPENAI_API_BASE_URL, value: "http://litellm:4000/v1"}
            - {name: OPENAI_API_KEY,      value: "sk-ai-service-2024"}
          volumeMounts:
            - {name: data, mountPath: /app/backend/data}
          resources:
            requests: {memory: "512Mi", cpu: "250m"}
            limits:   {memory: "2Gi",   cpu: "1000m"}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: ai-service
spec:
  selector: {app: openwebui}
  type: NodePort
  ports:
    - {port: 8080, targetPort: 8080, nodePort: 30300}
