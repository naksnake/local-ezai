apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: ai-service
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: ai-service
spec:
  replicas: 1
  selector:
    matchLabels: {app: qdrant}
  template:
    metadata:
      labels: {app: qdrant}
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - {containerPort: 6333}
            - {containerPort: 6334}
          resources:
            requests: {memory: "512Mi", cpu: "250m"}
            limits:   {memory: "2Gi",   cpu: "1000m"}
          volumeMounts:
            - {name: storage, mountPath: /qdrant/storage}
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: ai-service
spec:
  selector: {app: qdrant}
  ports:
    - {name: http, port: 6333, targetPort: 6333}
    - {name: grpc, port: 6334, targetPort: 6334}
